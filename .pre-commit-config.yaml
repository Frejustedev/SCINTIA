# Pre-commit hooks. Install once (network required): `pip install pre-commit && pre-commit install`.
# Backend: ruff (lint) + black (format). Frontend: prettier (format).
# A local hook hard-blocks committing DICOM / patient data.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=2048"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        files: ^backend/

  # Use the frontend's own prettier install so prettier-plugin-tailwindcss resolves
  # (mirrors-prettier's isolated env cannot load prettier 3 plugins).
  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        entry: node scripts/prettier-staged.cjs
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: true

  - repo: local
    hooks:
      - id: forbid-dicom
        name: forbid committing DICOM / patient data
        # Content-aware: catches extensionless DICOM and vendor formats, not just
        # known extensions (real SPECT/CT exports are often extensionless).
        entry: python scripts/check_no_dicom.py
        language: system
        pass_filenames: true
